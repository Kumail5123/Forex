databases:
  - name: forex-app-db
    plan: free

services:
  - type: web
    name: forex-app-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: AVA_PARTNER_TAG
        value: "222464"
      - key: AVA_POSTBACK_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: forex-app-db
          property: connectionString
